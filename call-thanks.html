    <script>
      (function() {
        var urlParams = new URLSearchParams(window.location.search);
        var gclid = urlParams.get('gclid');

        // 1. إرسال التحويل لجوجل أدز (البيانات الأصلية محفوظة بدقة)
        gtag('event', 'conversion', {
            'send_to': 'AW-16529004339/OIQ7COaD0ewaELOu0sk9',
            'value': 200.0,
            'currency': 'EGP'
        });

        // 2. إرسال البيانات لـ Make (Webhook) - محفوظة كما هي
        if (gclid) {
          var makeUrl = "https://hook.eu1.make.com/eozh2hwrnwdnr9ot9h7itdp41epe05u4";
          
          fetch(makeUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              "gclid": gclid,
              "source": "Phone Call",
              "page": window.location.pathname,
              "date": new Date().toLocaleString('en-US', { timeZone: 'Africa/Cairo' })
            })
          }).catch(err => console.log('System Handshake Error'));
        }

        // 3. التحويل التلقائي للاتصال بعد 3.5 ثانية لضمان نجاح الـ Tracking
        setTimeout(function () {
            window.location.href = 'tel:01016961497';
        }, 3500);
      })();
